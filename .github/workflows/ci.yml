name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: aankhanet

jobs:
  ts-typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: aankhanet/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  ts-lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: aankhanet/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  ts-test:
    name: TypeScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: aankhanet/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test --if-present

  py-lint:
    name: Python lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, ingestor, detector, dispatcher]
    defaults:
      run:
        working-directory: aankhanet/services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: uvx ruff check .
      - run: uvx mypy src/ --ignore-missing-imports
